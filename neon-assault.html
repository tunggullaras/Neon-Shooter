<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Assault</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #05050f; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { border: 1px solid #00eeff33; box-shadow: 0 0 40px #00eeff22; cursor: crosshair; max-width: 100vw; max-height: 100vh; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .screen { text-align: center; color: #fff; pointer-events: all; }
  .title { font-size: 52px; font-weight: 900; letter-spacing: 8px; color: #00eeff; text-shadow: 0 0 30px #00eeff, 0 0 60px #0066ff; margin-bottom: 8px; }
  .subtitle { color: #ffffff55; letter-spacing: 4px; margin-bottom: 30px; font-size: 13px; }
  .controls { color: #aaa; font-size: 13px; margin-bottom: 8px; }
  .btn { background: none; border: 2px solid #00eeff; color: #00eeff; padding: 14px 48px; font-size: 18px; letter-spacing: 4px; cursor: pointer; text-shadow: 0 0 10px #00eeff; box-shadow: 0 0 20px #00eeff44; font-family: inherit; margin: 8px; }
  .btn:hover { background: #00eeff22; }
  .btn-red { border-color: #ff4466; color: #ff4466; text-shadow: 0 0 10px #ff4466; box-shadow: 0 0 20px #ff446644; }
  .btn-red:hover { background: #ff446622; }
  .btn-gray { border-color: #555; color: #aaa; text-shadow: none; box-shadow: none; }
  .game-over-title { font-size: 48px; font-weight: 900; color: #ff4466; text-shadow: 0 0 30px #ff4466; margin-bottom: 12px; }
  .score-display { font-size: 24px; color: #00eeff; margin-bottom: 8px; }
  .wave-display { font-size: 16px; color: #aaa; margin-bottom: 40px; }
  #scoreVal, #waveVal { color: #00eeff; }
  hidden { display: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="menuScreen" class="screen">
    <div class="title">NEON ASSAULT</div>
    <div class="subtitle">TOP-DOWN SHOOTER</div>
    <div class="controls">WASD — Move</div>
    <div class="controls">Mouse — Aim &amp; Shoot (hold)</div>
    <div class="controls" style="margin-bottom:28px">Space / Shift — Dash (invincible!)</div>
    <button class="btn" onclick="startGame()">START GAME</button>
  </div>
  <div id="deadScreen" class="screen" style="display:none">
    <div class="game-over-title">GAME OVER</div>
    <div class="score-display">SCORE: <span id="finalScore">0</span></div>
    <div class="wave-display">WAVE REACHED: <span id="finalWave">1</span></div>
    <br>
    <button class="btn btn-red" onclick="startGame()">RETRY</button>
    <button class="btn btn-gray" onclick="showMenu()">MENU</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;
const W = 800, H = 600;

let state = null;
let keys = {};
let mouse = { x: W/2, y: H/2 };
let animId = null;
let shootCooldown = 0;
let bgOffset = 0;
let screen = 'menu';

window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault && (e.key===' ' && e.preventDefault()); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('mousedown', e => { if(e.button===0) keys['shoot']=true; });
canvas.addEventListener('mouseup', e => { if(e.button===0) keys['shoot']=false; });

function rand(a,b){ return Math.random()*(b-a)+a; }

function spawnEnemy(wave) {
  const side = Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=rand(0,W);y=-30;}
  else if(side===1){x=W+30;y=rand(0,H);}
  else if(side===2){x=rand(0,W);y=H+30;}
  else{x=-30;y=rand(0,H);}
  const r = Math.random();
  const type = r<0.2 ? 'tank' : r<0.45 ? 'shooter' : 'basic';
  return {
    id: Math.random(), x, y,
    hp: type==='tank'?6:type==='shooter'?2:1,
    maxHp: type==='tank'?6:type==='shooter'?2:1,
    speed: type==='tank'?0.9:type==='shooter'?1.2+wave*0.05:1.6+wave*0.08,
    type,
    shootTimer: type==='shooter'?rand(30,90):9999,
    radius: type==='tank'?20:14,
    flash: 0,
    angle: 0
  };
}

function particles(x,y,color,count=8,spd=3){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, s=rand(1,spd);
    state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,size:rand(2,5)});
  }
}

function initState(){
  state = {
    player: {x:W/2,y:H/2,angle:0,hp:5,maxHp:5,iframes:0,dashCooldown:0,dashActive:0},
    bullets:[], enemyBullets:[], enemies:[], particles:[], pickups:[],
    score:0, wave:1, waveTimer:180, spawnPool:6, spawnTimer:30
  };
}

function showMenu(){
  screen='menu';
  cancelAnimationFrame(animId);
  document.getElementById('menuScreen').style.display='';
  document.getElementById('deadScreen').style.display='none';
  // draw static bg
  ctx.fillStyle='#05050f'; ctx.fillRect(0,0,W,H);
}

function startGame(){
  document.getElementById('menuScreen').style.display='none';
  document.getElementById('deadScreen').style.display='none';
  screen='playing';
  initState();
  shootCooldown=0; bgOffset=0;
  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function gameOver(){
  screen='dead';
  document.getElementById('finalScore').textContent=state.score;
  document.getElementById('finalWave').textContent=state.wave;
  document.getElementById('deadScreen').style.display='';
  cancelAnimationFrame(animId);
}

function drawHex(x,y,r,fill,stroke){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=(Math.PI/3)*i-Math.PI/6;
    ctx[i===0?'moveTo':'lineTo'](x+r*Math.cos(a),y+r*Math.sin(a));
  }
  ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
}

function loop(){
  if(screen!=='playing') return;
  const p=state;
  const pl=p.player;

  // Movement
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup']) dy-=1;
  if(keys['s']||keys['arrowdown']) dy+=1;
  if(keys['a']||keys['arrowleft']) dx-=1;
  if(keys['d']||keys['arrowright']) dx+=1;
  if(dx&&dy){dx*=0.707;dy*=0.707;}

  if(pl.dashCooldown>0) pl.dashCooldown--;
  if(pl.dashActive>0) pl.dashActive--;
  if((keys[' ']||keys['shift'])&&pl.dashCooldown===0&&(dx||dy)){
    pl.dashActive=10; pl.dashCooldown=60;
    particles(pl.x,pl.y,'#00ffff',12,5);
  }

  const spd = pl.dashActive>0 ? 4*2.5 : 4;
  pl.x=Math.max(20,Math.min(W-20,pl.x+dx*spd));
  pl.y=Math.max(20,Math.min(H-20,pl.y+dy*spd));
  pl.angle=Math.atan2(mouse.y-pl.y,mouse.x-pl.x);
  if(pl.iframes>0) pl.iframes--;

  // Shoot
  if(shootCooldown>0) shootCooldown--;
  if(keys['shoot']&&shootCooldown===0){
    shootCooldown=8;
    p.bullets.push({x:pl.x+Math.cos(pl.angle)*25,y:pl.y+Math.sin(pl.angle)*25,vx:Math.cos(pl.angle)*10,vy:Math.sin(pl.angle)*10,life:65});
    if(p.score>500){
      const a1=pl.angle+0.12, a2=pl.angle-0.12;
      p.bullets.push({x:pl.x+Math.cos(pl.angle)*20,y:pl.y+Math.sin(pl.angle)*20,vx:Math.cos(a1)*10,vy:Math.sin(a1)*10,life:65});
      p.bullets.push({x:pl.x+Math.cos(pl.angle)*20,y:pl.y+Math.sin(pl.angle)*20,vx:Math.cos(a2)*10,vy:Math.sin(a2)*10,life:65});
    }
  }

  // Wave spawning
  p.waveTimer--;
  if(p.waveTimer<=0&&p.spawnPool<=0&&p.enemies.length===0){
    p.wave++; p.spawnPool=5+p.wave*3; p.waveTimer=120;
  }
  if(p.spawnPool>0){
    p.spawnTimer--;
    if(p.spawnTimer<=0){
      p.enemies.push(spawnEnemy(p.wave));
      p.spawnPool--;
      p.spawnTimer=Math.max(18,55-p.wave*3);
    }
  }

  // Enemies
  p.enemies.forEach(e=>{
    const ex=pl.x-e.x,ey=pl.y-e.y;
    const dist=Math.sqrt(ex*ex+ey*ey)||1;
    const nx=ex/dist,ny=ey/dist;
    e.angle=Math.atan2(ey,ex);
    if(e.type==='shooter'){
      if(dist>180){e.x+=nx*e.speed;e.y+=ny*e.speed;}
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=90;
        p.enemyBullets.push({x:e.x,y:e.y,vx:nx*3,vy:ny*3,life:130});
      }
    } else {
      e.x+=nx*e.speed; e.y+=ny*e.speed;
    }
    if(e.flash>0) e.flash--;
  });

  // Player bullets vs enemies
  p.bullets=p.bullets.filter(b=>{
    b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H) return false;
    let hit=false;
    p.enemies=p.enemies.filter(e=>{
      const ddx=b.x-e.x,ddy=b.y-e.y;
      if(Math.sqrt(ddx*ddx+ddy*ddy)<e.radius){
        e.hp--; e.flash=6;
        particles(b.x,b.y,'#ff8800',4,2);
        if(e.hp<=0){
          particles(e.x,e.y,e.type==='tank'?'#ff4444':e.type==='shooter'?'#aa44ff':'#ff8800',18,5);
          p.score+=e.type==='tank'?30:e.type==='shooter'?20:10;
          if(Math.random()<0.15) p.pickups.push({x:e.x,y:e.y,life:300});
          return false;
        }
        hit=true;
      }
      return true;
    });
    return !hit;
  });

  // Enemy bullets vs player
  p.enemyBullets=p.enemyBullets.filter(b=>{
    b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H) return false;
    if(pl.iframes===0&&pl.dashActive===0){
      const ddx=b.x-pl.x,ddy=b.y-pl.y;
      if(Math.sqrt(ddx*ddx+ddy*ddy)<18){
        pl.hp--; pl.iframes=60;
        particles(pl.x,pl.y,'#ff0000',10,3);
        if(pl.hp<=0){gameOver();return false;}
        return false;
      }
    }
    return true;
  });

  // Contact damage
  if(pl.iframes===0){
    p.enemies.forEach(e=>{
      const ddx=e.x-pl.x,ddy=e.y-pl.y;
      if(Math.sqrt(ddx*ddx+ddy*ddy)<e.radius+18){
        pl.hp--; pl.iframes=70;
        particles(pl.x,pl.y,'#ff0000',10,3);
        if(pl.hp<=0) gameOver();
      }
    });
  }

  // Pickups
  p.pickups=p.pickups.filter(pk=>{
    pk.life--;
    const ddx=pk.x-pl.x,ddy=pk.y-pl.y;
    if(Math.sqrt(ddx*ddx+ddy*ddy)<25){
      if(pl.hp<pl.maxHp){pl.hp++;} 
      particles(pk.x,pk.y,'#00ff88',12,3);
      return false;
    }
    return pk.life>0;
  });

  // Particles
  p.particles=p.particles.filter(pt=>{
    pt.x+=pt.vx; pt.y+=pt.vy;
    pt.vx*=0.92; pt.vy*=0.92;
    pt.life-=0.03;
    return pt.life>0;
  });

  // ---- DRAW ----
  bgOffset=(bgOffset+0.4)%40;
  ctx.fillStyle='#0a0a12'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(0,200,255,0.06)'; ctx.lineWidth=1;
  for(let gx=-bgOffset;gx<W+40;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(let gy=-bgOffset;gy<H+40;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

  // Pickups
  const t=Date.now();
  p.pickups.forEach(pk=>{
    const pulse=Math.sin(t*0.01)*3;
    ctx.save();
    ctx.shadowColor='#00ff88'; ctx.shadowBlur=15+pulse;
    ctx.fillStyle='#00ff88';
    ctx.beginPath(); ctx.arc(pk.x,pk.y,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('+',pk.x,pk.y);
    ctx.restore();
  });

  // Particles
  p.particles.forEach(pt=>{
    ctx.save(); ctx.globalAlpha=pt.life;
    ctx.fillStyle=pt.color; ctx.shadowColor=pt.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.size*pt.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Enemy bullets
  p.enemyBullets.forEach(b=>{
    ctx.save(); ctx.fillStyle='#ff4466'; ctx.shadowColor='#ff4466'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  // Player bullets
  p.bullets.forEach(b=>{
    ctx.save(); ctx.fillStyle='#00eeff'; ctx.shadowColor='#00eeff'; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  // Enemies
  p.enemies.forEach(e=>{
    ctx.save(); ctx.translate(e.x,e.y);
    const flash=e.flash>0;
    const ec=e.type==='tank'?(flash?'#fff':'#ff4444'):e.type==='shooter'?(flash?'#fff':'#cc44ff'):(flash?'#fff':'#ff8800');
    ctx.shadowColor=ec; ctx.shadowBlur=14;

    // HP bar
    const bw=e.radius*2;
    ctx.fillStyle='#222'; ctx.fillRect(-e.radius,-e.radius-12,bw,6);
    ctx.fillStyle=ec; ctx.fillRect(-e.radius,-e.radius-12,bw*(e.hp/e.maxHp),6);

    if(e.type==='tank'){
      drawHex(0,0,e.radius,ec,'#fff5');
      ctx.fillStyle='#fff2'; ctx.beginPath(); ctx.arc(0,0,e.radius*0.45,0,Math.PI*2); ctx.fill();
    } else if(e.type==='shooter'){
      ctx.rotate(t*0.002);
      ctx.fillStyle=ec;
      for(let i=0;i<4;i++){
        ctx.rotate(Math.PI/2);
        ctx.fillRect(-5,-e.radius,10,e.radius*0.65);
      }
      ctx.fillStyle=ec; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle=ec; ctx.beginPath();
      ctx.moveTo(0,-e.radius);
      ctx.lineTo(e.radius*0.87,e.radius*0.5);
      ctx.lineTo(-e.radius*0.87,e.radius*0.5);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  });

  // Player
  ctx.save(); ctx.translate(pl.x,pl.y); ctx.rotate(pl.angle);
  const blink=pl.iframes>0&&Math.floor(pl.iframes/5)%2===0;
  ctx.globalAlpha=blink?0.25:1;
  ctx.shadowColor=pl.dashActive>0?'#00ffff':'#00aaff';
  ctx.shadowBlur=pl.dashActive>0?35:15;
  ctx.fillStyle='#1188ff';
  ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(-14,-13); ctx.lineTo(-8,0); ctx.lineTo(-14,13); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#aaeeff';
  ctx.beginPath(); ctx.ellipse(6,0,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#88ccff'; ctx.fillRect(12,-3,18,6);
  ctx.restore();

  // HUD - Hearts
  for(let i=0;i<pl.maxHp;i++){
    const alive=i<pl.hp;
    ctx.save();
    ctx.fillStyle=alive?'#ff4466':'#2a1a1a';
    ctx.shadowColor='#ff4466'; ctx.shadowBlur=alive?10:0;
    const hx=22+i*26, hy=22;
    ctx.beginPath();
    ctx.moveTo(hx,hy+9);
    ctx.bezierCurveTo(hx,hy+5,hx-10,hy-2,hx-10,hy-6);
    ctx.bezierCurveTo(hx-10,hy-12,hx,hy-12,hx,hy-7);
    ctx.bezierCurveTo(hx,hy-12,hx+10,hy-12,hx+10,hy-6);
    ctx.bezierCurveTo(hx+10,hy-2,hx,hy+5,hx,hy+9);
    ctx.fill(); ctx.restore();
  }

  // Score & Wave
  ctx.shadowBlur=0;
  ctx.fillStyle='#00eeff'; ctx.font='bold 18px "Courier New"'; ctx.textAlign='right';
  ctx.fillText('SCORE: '+p.score, W-20, 28);
  ctx.fillStyle='#ffffff66'; ctx.font='13px "Courier New"';
  ctx.fillText('WAVE '+p.wave, W-20, 50);

  // Dash bar
  const dp=1-pl.dashCooldown/60;
  ctx.fillStyle='#111'; ctx.fillRect(20,H-28,100,8);
  ctx.fillStyle=dp>=1?'#00ffcc':'#0077aa';
  ctx.shadowColor=dp>=1?'#00ffcc':'none'; ctx.shadowBlur=dp>=1?8:0;
  ctx.fillRect(20,H-28,100*dp,8);
  ctx.shadowBlur=0; ctx.fillStyle='#888'; ctx.font='11px monospace'; ctx.textAlign='left';
  ctx.fillText('DASH [SPACE]',20,H-34);

  animId=requestAnimationFrame(loop);
}

// Draw menu background
ctx.fillStyle='#05050f'; ctx.fillRect(0,0,W,H);
ctx.strokeStyle='rgba(0,200,255,0.06)'; ctx.lineWidth=1;
for(let gx=0;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
for(let gy=0;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
</script>
</body>
</html>
